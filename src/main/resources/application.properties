server.port=${PORT:8080}

# Auth (user-json-service)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${JSON_SERVICE_URL:http://10.104.16.3:8080}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# User JSON Service
spring.cloud.gateway.routes[1].id=json-service
spring.cloud.gateway.routes[1].uri=${JSON_SERVICE_URL:http://10.104.16.3:8080}
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[1].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# SOAP Service
spring.cloud.gateway.routes[2].id=soap-service
spring.cloud.gateway.routes[2].uri=${SOAP_SERVICE_URL:http://10.104.16.4:8080}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/soap/**
spring.cloud.gateway.routes[2].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# File Manager Service
spring.cloud.gateway.routes[3].id=file-service
spring.cloud.gateway.routes[3].uri=${FILE_SERVICE_URL:http://10.104.16.5:8082}
spring.cloud.gateway.routes[3].predicates[0]=Path=/files/**
spring.cloud.gateway.routes[3].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Mail Service
spring.cloud.gateway.routes[4].id=mail-service
spring.cloud.gateway.routes[4].uri=${MAIL_SERVICE_URL:http://10.104.16.6:8083}
spring.cloud.gateway.routes[4].predicates[0]=Path=/mail/**
spring.cloud.gateway.routes[4].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Cache Service
spring.cloud.gateway.routes[5].id=cache-service
spring.cloud.gateway.routes[5].uri=${CACHE_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[5].predicates[0]=Path=/cache/**
spring.cloud.gateway.routes[5].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
