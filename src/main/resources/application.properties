server.port=${PORT:8080}
spring.codec.max-in-memory-size=10MB

# Auth (user-json-service)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${JSON_SERVICE_URL:http://10.104.16.3:8080}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Auth with /api prefix
spring.cloud.gateway.routes[1].id=api-auth-service
spring.cloud.gateway.routes[1].uri=${JSON_SERVICE_URL:http://10.104.16.3:8080}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}
spring.cloud.gateway.routes[1].filters[1]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# User JSON Service
spring.cloud.gateway.routes[2].id=json-service
spring.cloud.gateway.routes[2].uri=${JSON_SERVICE_URL:http://10.104.16.3:8080}
